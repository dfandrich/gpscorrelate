# Github Actions configuration
name: CI

permissions: {}

on:
  # Trigger the workflow on push or pull requests, but only for the
  # master and ci branches
  push:
    branches:
      - master
      - ci
    paths-ignore:
      - '.appveyor.yml'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '.appveyor.yml'

env:
  MAKEFLAGS: -j 4

jobs:
  build-ubuntu:
    runs-on: ubuntu-${{ matrix.osver }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        osver: [22.04, 24.04, 26.04]
        build:
          - cc: gcc-10
            gtk: 2
            install: desktop-file-utils docbook-xsl exiv2 libexiv2-dev libgtk2.0-dev xsltproc gettext gcc-10
            cflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1
            cxx: g++
            target: all
            install_target: install install-po
            osver: 22.04
          - cc: gcc-10
            gtk: 3
            install: desktop-file-utils docbook-xsl exiv2 libexiv2-dev libgtk-3-dev xsltproc gettext gcc-10
            cflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1
            cxx: g++
            target: all
            install_target: install install-po
            osver: 22.04
          - cc: clang-11
            gtk: 2
            install: desktop-file-utils docbook-xsl exiv2 libexiv2-dev libgtk2.0-dev gettext xsltproc clang-11
            cflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1
            cxx: clang++-11
            target: all
            install_target: install install-po
            osver: 22.04
          - cc: clang-11
            gtk: 3
            install: desktop-file-utils docbook-xsl exiv2 libexiv2-dev libgtk-3-dev xsltproc gettext clang-11
            cflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1
            cxx: clang++-11
            target: all
            install_target: install install-po
            osver: 22.04
          - cc: gcc
            gtk: 3
            install: desktop-file-utils docbook-xsl exiv2 libexiv2-dev libgtk-3-dev xsltproc gettext
            cflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1
            cxx: g++
            target: all
            install_target: install install-po
          - cc: clang
            gtk: 3
            install: desktop-file-utils docbook-xsl exiv2 libexiv2-dev libgtk-3-dev xsltproc gettext
            cflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1
            cxx: clang++
            target: all
            install_target: install install-po
          - name: no-nls
            cc: gcc
            gtk: 3
            install: desktop-file-utils docbook-xsl exiv2 libexiv2-dev libgtk-3-dev xsltproc
            cflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3
            cxx: g++
            target: all
            install_target: install
          - name: debuglog
            cc: gcc
            gtk: 3
            install: desktop-file-utils docbook-xsl exiv2 libexiv2-dev libgtk-3-dev xsltproc gettext
            cflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1 -DDEBUG
            cxx: g++
            target: all
            install_target: install install-po
            failing_tests: 18
          - name: sanitize
            cc: clang
            gtk: 3
            install: desktop-file-utils docbook-xsl exiv2 libexiv2-dev libgtk-3-dev xsltproc gettext
            cflags: -g -O0 -fsanitize=address -fsanitize=undefined -DENABLE_NLS=1
            ldflags: -g -O0 -fsanitize=address -fsanitize=undefined
            cxx: clang++
            target: all
            install_target: install install-po
            asan_options: strict_string_checks=0:detect_stack_use_after_return=1:check_initialization_order=1:strict_init_order=1:use_sigaltstack=0
          - name: 'compile as c++'
            cc: g++
            gtk: 3
            install: desktop-file-utils docbook-xsl exiv2 libexiv2-dev libgtk-3-dev xsltproc gettext
            cflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1
            cxx: g++
            target: all
            install_target: install install-po
          - name: 'valgrind tests'
            cc: gcc
            install: docbook-xsl exiv2 libexiv2-dev libgtk-3-dev xsltproc gettext valgrind
            cflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1
            cxx: g++
            target: gpscorrelate
            install_target: install-gpscorrelate
            check_options: -m
          - name: 'locale tests'
            cc: gcc
            gtk: 3
            install: desktop-file-utils docbook-xsl exiv2 libexiv2-dev libgtk-3-dev xsltproc gettext locales-all
            cflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1
            cxx: g++
            target: all
            install_target: install install-po
            # Turkish is one of the better locales to test in that it has unusual
            # upper/lowercase folding and comma as decimal separator.
            locale: tr_TR
          - name: 'C99/C++11'
            cc: gcc
            gtk: 3
            install: desktop-file-utils docbook-xsl exiv2 libexiv2-dev libgtk-3-dev xsltproc gettext
            cflags: -std=c99 -D_POSIX_C_SOURCE=200809L -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1
            cxx: g++
            cxxflags: -std=c++11 -D_POSIX_C_SOURCE=200809L -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1
            target: all
            install_target: install install-po
        exclude:
          # Exclude configurations from the matrix intended for a single OS version
          - osver: 24.04
            build:
              osver: 22.04
          - osver: 26.04
            build:
              osver: 22.04

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: 'install deps'
        run: sudo apt-get update -y; sudo apt-get install -y --no-install-suggests --no-install-recommends ${{ matrix.build.install }}
      - name: 'build'
        run: make CFLAGS="${{ matrix.build.cflags }}" CXXFLAGS="${{ matrix.build.cxxflags || matrix.build.cflags }}" LDFLAGS="${{ matrix.build.ldflags }}" CC="${{ matrix.build.cc }}" CXX="${{ matrix.build.cxx }}" GTK="${{ matrix.build.gtk }}" ${{ matrix.build.make_opts }} ${{ matrix.build.target }}
      - name: 'smoke test'
        # ASAN_OPTIONS is to work around https://bugzilla.redhat.com/show_bug.cgi?id=1950244
        run: env ASAN_OPTIONS="${{ matrix.build.asan_options }}" ./gpscorrelate -V
      - name: 'test'
        run: |
          FAILING_TESTS="${{ matrix.build.failing_tests }}"
          if [[ -n "${{ matrix.build.locale }}" ]]; then
            export LC_ADDRESS="${{ matrix.build.locale }}"
            export LC_COLLATE="${{ matrix.build.locale }}"
            export LC_CTYPE="${{ matrix.build.locale }}"
            export LC_IDENTIFICATION="${{ matrix.build.locale }}"
            export LC_MEASUREMENT="${{ matrix.build.locale }}"
            export LC_MESSAGES="${{ matrix.build.locale }}"
            export LC_MONETARY="${{ matrix.build.locale }}"
            export LC_NAME="${{ matrix.build.locale }}"
            export LC_NUMERIC="${{ matrix.build.locale }}"
            export LC_PAPER="${{ matrix.build.locale }}"
            export LC_SOURCED="${{ matrix.build.locale }}"
            export LC_TELEPHONE="${{ matrix.build.locale }}"
            export LC_TIME="${{ matrix.build.locale }}"
          fi
          if [[ -z "${{ matrix.build.failing_tests }}" ]] ; then
            make check CHECK_OPTIONS="-v ${{ matrix.build.check_options }}" ASAN_OPTIONS="${{ matrix.build.asan_options }}"
          else
            echo "Expecting ${{ matrix.build.failing_tests }} test failures"
            make check CHECK_OPTIONS="-v ${{ matrix.build.check_options }}" | tee /dev/stderr | grep -Fq "${{ matrix.build.failing_tests }} test(s) have FAILED"
          fi
      - name: 'install test'
        run: make prefix= DESTDIR="${PWD}" ${{ matrix.build.install_target }}

  coverage:
    runs-on: ubuntu-26.04
    timeout-minutes: 10
    strategy:
      matrix:
        build:
          - cc: gcc
            gtk: 3
            install: desktop-file-utils docbook-xsl exiv2 libexiv2-dev libgtk-3-dev xsltproc lcov
            cflags: -g -O0 --coverage
            ldflags: -g -O0 --coverage
            cxx: g++
            target: gpscorrelate

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: 'install deps'
        run: sudo apt-get update -y; sudo apt-get install -y --no-install-suggests --no-install-recommends ${{ matrix.build.install }}
      - name: 'build'
        run: make CFLAGS="${{ matrix.build.cflags }}" LDFLAGS="${{ matrix.build.ldflags }}" CC="${{ matrix.build.cc }}" CXX="${{ matrix.build.cxx }}" GTK="${{ matrix.build.gtk }}" ${{ matrix.build.make_opts }} ${{ matrix.build.target }}
      - name: 'smoke test'
        run: ./gpscorrelate -V
      - name: 'test'
        run: make check CHECK_OPTIONS=-v
      - name: coverage analysis
        run: mkdir coverage && lcov -c -d . -o coverage/lcov.info --exclude "/usr/include/*"
      - name: push to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.github_token }}

  build-osx:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    env:
      MAKEFLAGS: -j 3
      # This becomes the default in Homebrew 6 and 5.2
      HOMEBREW_REQUIRE_TAP_TRUST: 1
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26]
        build:
          - cc: gcc
            gtk: 2
            install: desktop-file-utils docbook-xsl exiv2 gtk+
            cflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1
            cxxflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1 -std=c++11
            ldflags: -O3 -lintl
            cxx: g++
            target: all
            install_target: install install-po install-desktop-file
          - cc: gcc
            gtk: 3
            install: desktop-file-utils docbook-xsl exiv2 gtk+3
            cflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1
            cxxflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1 -std=c++11
            ldflags: -O3 -lintl
            cxx: g++
            target: all
            install_target: install install-po install-desktop-file
          - cc: clang
            gtk: 2
            install: desktop-file-utils docbook-xsl exiv2 gtk+
            cflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1
            cxxflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1 -std=c++11
            ldflags: -O3 -lintl
            cxx: clang++
            target: all
            install_target: install install-po install-desktop-file
          - cc: clang
            gtk: 3
            install: desktop-file-utils docbook-xsl exiv2 gtk+3
            cflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1
            cxxflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1 -std=c++11
            ldflags: -O3 -lintl
            cxx: clang++
            target: all
            install_target: install install-po install-desktop-file

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: install deps
        run: brew install ${{ matrix.build.install }}
      - name: build
        run: make CFLAGS="-I$(brew --prefix)/include ${{ matrix.build.cflags }}" CXXFLAGS="${{ matrix.build.cxxflags }}" LDFLAGS="-L$(brew --prefix)/lib ${{ matrix.build.ldflags }}" CC="${{ matrix.build.cc }}" CXX="${{ matrix.build.cxx }}" GTK="${{ matrix.build.gtk }}" ${{ matrix.build.make_opts }} XML_CATALOG_FILES="$(brew --prefix)/etc/xml/catalog" ${{ matrix.build.target }}
      - name: smoke test
        run: ./gpscorrelate -V
      - name: test
        run: |
          if [[ -z "${{ matrix.build.failing_tests }}" ]] ; then
            make check CHECK_OPTIONS=-v ASAN_OPTIONS="${{ matrix.build.asan_options }}"
          else
            # Debug logging enabled makes some tests fail due to differing output
            echo 'Expecting ${{ matrix.build.failing_tests }} test failures'
            make check CHECK_OPTIONS=-v | tee /dev/stderr | grep -q '${{ matrix.build.failing_tests }} test(s) have FAILED'
          fi
      - name: install test
        run: make prefix= DESTDIR="${PWD}" -j 1 ${{ matrix.build.install_target }}

  build-fedora:
    runs-on: ubuntu-latest
    container: fedora:${{ matrix.osver }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        osver: [43, 44]
        build:
          - cc: gcc
            gtk: 3
            install: gcc g++ make diffutils desktop-file-utils docbook-style-xsl exiv2 exiv2-devel gtk3-devel xsltproc gettext-devel
            cflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1
            cxx: g++
            target: all
            install_target: install install-po install-desktop-file

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: install deps
        run: |
          dnf install -y --setopt=install_weak_deps=False ${{ matrix.build.install }}
      - name: build
        run: make CFLAGS="${{ matrix.build.cflags }}" LDFLAGS="${{ matrix.build.ldflags }}" CC="${{ matrix.build.cc }}" CXX="${{ matrix.build.cxx }}" GTK="${{ matrix.build.gtk }}" ${{ matrix.build.make_opts }} ${{ matrix.build.target }}
      - name: smoke test
        run: ./gpscorrelate -V
      - name: test
        run: |
          install -d -m 0777 tests/log
          if [[ -z "${{ matrix.build.failing_tests }}" ]] ; then
            sudo -u nobody make check CHECK_OPTIONS=-v ASAN_OPTIONS="${{ matrix.build.asan_options }}"
          else
            # Debug logging enabled makes some tests fail due to differing output
            echo 'Expecting ${{ matrix.build.failing_tests }} test failures'
            sudo -u nobody make check CHECK_OPTIONS=-v | tee /dev/stderr | grep -q '${{ matrix.build.failing_tests }} test(s) have FAILED'
          fi
      - name: install test
        run: make prefix= DESTDIR="${PWD}" ${{ matrix.build.install_target }}

  build-debian:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        build:
          - name: '32-bit i686'
            cc: i686-linux-gnu-gcc-12
            cxx: i686-linux-gnu-g++-12
            install: make gcc-12-i686-linux-gnu g++-12-i686-linux-gnu exiv2:i386 libexiv2-dev:i386 libgtk-3-dev:i386 gettext:i386 libxml2-dev:i386
            cflags: -m32 -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1
            target: gpscorrelate gpscorrelate-gui
            arch: i386
            # Debian stable
            container: debian:bookworm-slim
          - name: 'x86_64 testing'
            cc: gcc
            cxx: g++
            install: make gcc g++ exiv2 libexiv2-dev libgtk-3-dev gettext libxml2-dev adduser
            cflags: -O3 -DENABLE_NLS=1 -Wall -Wextra -Wpedantic -Werror -Wno-error=deprecated-declarations -Wno-error=format-truncation -Wformat-truncation=2 -Wno-format-nonliteral -Wbad-function-cast -Wconversion -Wmissing-declarations -Wmissing-prototypes -Wnested-externs -Wno-long-long -Wno-multichar -Wpointer-arith -Wshadow -Wsign-compare -Wundef -Wunused -Wwrite-strings -Waddress -Wattributes -Wcast-align -Wcast-qual -Wdiv-by-zero -Wempty-body -Wendif-labels -Wfloat-equal -Wformat-security -Wignored-qualifiers -Wmissing-field-initializers -Wmissing-noreturn -Wno-padded -Wno-sign-conversion -Wno-switch-default -Wno-switch-enum -Wno-system-headers -Wold-style-definition -Wredundant-decls -Wstrict-prototypes -Wtype-limits -Wunreachable-code -Wunused-parameter -Wvla -Wclobbered -Wmissing-parameter-type -Wold-style-declaration -Wpragmas -Wstrict-aliasing=3 -ftree-vrp -Wjump-misses-init -Wdouble-promotion -Wformat=2 -Wtrampolines -Warray-bounds=2 -Wno-format-signedness -Wduplicated-cond -Wnull-dereference -fdelete-null-pointer-checks -Wshift-negative-value -Wshift-overflow=2 -Wunused-const-variable -Walloc-zero -Wduplicated-branches -Wimplicit-fallthrough -Wrestrict -Warith-conversion -Wenum-conversion -Warray-compare -Wenum-int-mismatch -Wxor-used-as-pow
            cxxflags: -O3 -DENABLE_NLS=1 -Wall -Wextra -Wpedantic -Werror -Wno-error=deprecated-declarations -Wno-error=format-truncation -Wformat-truncation=2 -Wno-format-nonliteral -Wconversion -Wmissing-declarations -Wno-long-long -Wno-multichar -Wpointer-arith -Wshadow -Wsign-compare -Wundef -Wunused -Wwrite-strings -Waddress -Wattributes -Wcast-align -Wcast-qual -Wdiv-by-zero -Wempty-body -Wendif-labels -Wfloat-equal -Wformat-security -Wignored-qualifiers -Wmissing-field-initializers -Wmissing-noreturn -Wno-padded -Wno-sign-conversion -Wno-switch-default -Wno-switch-enum -Wno-system-headers -Wredundant-decls -Wtype-limits -Wunreachable-code -Wunused-parameter -Wvla -Wclobbered -Wpragmas -Wstrict-aliasing=3 -ftree-vrp -Wdouble-promotion -Wformat=2 -Wtrampolines -Warray-bounds=2 -Wno-format-signedness -Wduplicated-cond -Wnull-dereference -fdelete-null-pointer-checks -Wshift-negative-value -Wshift-overflow=2 -Wunused-const-variable -Walloc-zero -Wduplicated-branches -Wimplicit-fallthrough -Wrestrict -Warith-conversion -Wenum-conversion -Warray-compare -Wxor-used-as-pow
            target: gpscorrelate gpscorrelate-gui
            arch: amd64
            # Debian testing
            container: debian:testing
    container: ${{ matrix.build.container }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: 'install deps'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          dpkg --add-architecture ${{ matrix.build.arch }} && apt-get update -y && apt-get install -y --no-install-suggests --no-install-recommends ${{ matrix.build.install }}
          # Create a user for running tests, as some fail under root
          adduser --disabled-password --comment '' build
          chown build . doc tests
      - name: 'build'
        env:
          PKG_CONFIG_PATH: /usr/lib/${{ matrix.build.arch }}-linux-gnu/pkgconfig
        run: su build -c 'make CFLAGS="${{ matrix.build.cflags }}" CXXFLAGS="${{ matrix.build.cxxflags || matrix.build.cflags }}" LDFLAGS="${{ matrix.build.ldflags }}" CC="${{ matrix.build.cc }}" CXX="${{ matrix.build.cxx }}" ${{ matrix.build.make_opts }} ${{ matrix.build.target }}'
      - name: 'smoke test'
        run: ./gpscorrelate -V
      - name: 'tests'
        run: su build -c 'make check CHECK_OPTIONS=-v'

  freebsd:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: cpa.sh {0}
    strategy:
      fail-fast: false
      matrix:
        osver: ['13.5', '14.3', '15.1']
        arch: ['x86_64', 'aarch64']
        gtk: [3]
        build:
          - cc: cc
            cflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1
            cxx: c++
            ldflags: -O3 -lintl
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: start VM
        uses: cross-platform-actions/action@v1
        with:
          operating_system: 'freebsd'
          version: ${{ matrix.osver }}
          architecture: ${{ matrix.arch }}
      - name: install deps
        run: sudo pkg install -y pkgconf docbook-xsl exiv2 libxml2 gtk"${{ matrix.gtk }}" libxslt gettext-tools desktop-file-utils
      - name: build
        run: make -j 3 CC="${{ matrix.build.cc }}" CXX="${{ matrix.build.cxx }}" CFLAGS="${{ matrix.build.cflags }}" LDFLAGS="${{ matrix.build.ldflags }}" GTK="${{ matrix.gtk }}"
      - name: smoke test
        run: ./gpscorrelate -V
      - name: test
        run: make check CHECK_OPTIONS=-v
      - name: install test
        run: make prefix= DESTDIR="${HOME}" install install-po install-desktop-file

  build-alpine:
    runs-on: ubuntu-latest
    container: alpine:${{ matrix.osver }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        osver: ['3.20', '3.24']
        gtk: [2, 3]
        build:
          - install: gcc g++ make diffutils desktop-file-utils docbook-style-xsl exiv2 exiv2-devel gtk3-devel xsltproc gettext-devel
            cc: gcc
            cflags: -Wall -Wextra -Werror -Wno-error=deprecated-declarations -O3 -DENABLE_NLS=1
            ldflags: -O3 -lm -lintl
            cxx: g++
            target: all
            install_target: install install-po install-desktop-file

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: install deps
        run: |
          apk add --no-cache build-base exiv2 exiv2-dev libxml2-dev gettext-dev "gtk+${{ matrix.gtk }}.0-dev" desktop-file-utils
      - name: build
        run: make CFLAGS="${{ matrix.build.cflags }}" LDFLAGS="${{ matrix.build.ldflags }}" CC="${{ matrix.build.cc }}" CXX="${{ matrix.build.cxx }}" GTK="${{ matrix.gtk }}" ${{ matrix.build.make_opts }} ${{ matrix.build.target }}
      - name: smoke test
        run: ./gpscorrelate -V
      - name: test
        run: |
          # Create a user for running tests
          adduser -D build
          # The tests involving writing to read-only files fail when run as root
          # (because the OS allows the files to be overwritten then). Run the
          # tests as a normal user to get around that problem. The log directory
          # must be world-writable since files will be written there.
          install -d -m 0777 tests/log
          su build -c 'make check CHECK_OPTIONS=-v'
      - name: install test
        run: make prefix= DESTDIR="${PWD}" ${{ matrix.build.install_target }}
